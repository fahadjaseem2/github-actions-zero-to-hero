name: Deploy flask app 1

on:
  workflow_dispatch:

jobs:
  deploy:
    env: prod
        DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
    runs-on: self-hosted

    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: deploy with docker compose
        run: docker-compose up -d --build
